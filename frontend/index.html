<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yggdrasil — 认知森林观测器</title>
  <style>
    .loading-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #101820; color: #9aa99d;
      z-index: 9999; transition: opacity .5s ease;
    }
    .loading-screen.hidden { opacity: 0; pointer-events: none; }
    .loading-screen .tree-icon { font-size: 48px; margin-bottom: 16px; }
    .loading-screen .loader {
      margin-top: 20px; width: 32px; height: 32px;
      border: 2px solid #2a3840; border-top-color: #77b7c9;
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loading-screen" id="loading-screen">
    <div class="tree-icon">🌳</div>
    <p>Yggdrasil 认知森林观测器</p>
    <div class="loader"></div>
  </div>

  <div id="root"></div>

  <script type="module" src="/src/main.tsx"></script>

  <script>
    window.addEventListener('load', () => {
      setTimeout(() => document.getElementById('loading-screen')?.classList.add('hidden'), 400);
    });
  </script>
</body>
</html>
